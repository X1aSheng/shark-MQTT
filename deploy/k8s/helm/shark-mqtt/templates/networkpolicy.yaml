{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "shark-mqtt.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shark-mqtt.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "shark-mqtt.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.mqttPort }}
        - protocol: TCP
          port: {{ .Values.service.metricsPort }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.service.mqttPort }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.service.metricsPort }}
{{- end }}
