apiVersion: apps/v1
kind: Deployment
metadata:
  name: shark-mqtt
  namespace: shark-mqtt
  labels:
    app.kubernetes.io/name: shark-mqtt
    app.kubernetes.io/component: broker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: shark-mqtt
      app.kubernetes.io/component: broker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shark-mqtt
        app.kubernetes.io/component: broker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: shark-mqtt
          image: x1asheng/shark-mqtt:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-addr=:1883"
          ports:
            - name: mqtt
              containerPort: 1883
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: MQTT_LOG_LEVEL
              value: "info"
            - name: MQTT_LOG_FORMAT
              value: "json"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - shark-mqtt
                topologyKey: kubernetes.io/hostname
