apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: shark-mqtt
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: shark-mqtt
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: web
      protocol: TCP
