apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shark-mqtt
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: shark-mqtt
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "shark-mqtt"
        metrics_path: /metrics
        static_configs:
          - targets: ["shark-mqtt.shark-mqtt.svc.cluster.local:9090"]
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: "shark-mqtt"
