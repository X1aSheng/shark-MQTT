version: "3.8"

services:
  shark-mqtt:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: shark-mqtt:test
    container_name: shark-mqtt-test
    command: ["-addr=:18983", "-allow-all"]
    ports:
      - "18983:18983"
      - "18999:18999"
    environment:
      - MQTT_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18999/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

  test-runner:
    image: golang:1.26-alpine
    container_name: shark-mqtt-test-runner
    depends_on:
      shark-mqtt:
        condition: service_healthy
    environment:
      - MQTT_BROKER_ADDR=shark-mqtt:18983
      - GOPROXY=https://goproxy.cn,direct
    working_dir: /test
    volumes:
      - ../..:/test
    command:
      - sh
      - -c
      - |
        echo ">>> Health check..."
        wget -qO- http://shark-mqtt:18999/healthz
        echo ""
        echo ">>> Running integration smoke tests..."
        go test -v -count=1 -timeout 60s -run "TestConnectFlow|TestPubSub|TestQoS0" ./tests/integration/...
