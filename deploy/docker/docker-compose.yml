version: "3.8"

services:
  shark-mqtt:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: shark-mqtt:latest
    container_name: shark-mqtt
    ports:
      - "1883:1883"
      - "8883:8883"
      - "9090:9090"
    environment:
      - MQTT_LOG_LEVEL=info
      - MQTT_LOG_FORMAT=json
    volumes:
      - mqtt-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    profiles: ["prod", "monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - shark-mqtt
    restart: unless-stopped

