name: CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Unit Tests Matrix
  # ─────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    strategy:
      matrix:
        go-version: ['1.23', '1.24', '1.25']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests with race detector
        run: go test -race -v -count=1 ./...

      - name: Run unit tests for coverage
        run: go test -coverprofile=coverage.out -count=1 ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.23'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Check coverage threshold
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.23'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 50% threshold"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 2: Plugin Manager Tests
  # ─────────────────────────────────────────────────────────────
  test-plugin:
    name: Plugin Manager Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run plugin tests
        run: go test -race -v ./plugin/...

  # ─────────────────────────────────────────────────────────────
  # Job 3: Code Quality
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 4: Build Verification
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Verification
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build all packages
        run: go build -v ./...

      - name: Build examples
        run: go build -o /tmp/shark-mqtt-examples ./examples/...

      - name: Verify module
        run: go mod verify

  # ─────────────────────────────────────────────────────────────
  # Job 5: Docker Build & Smoke Test
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build Docker image
        run: docker build -t shark-mqtt:ci .

      - name: Start container
        run: |
          docker run -d --name mqtt-ci -p 1883:1883 -p 9090:9090 shark-mqtt:ci
          echo "Waiting for health check..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/healthz >/dev/null 2>&1; then
              echo "Container healthy."
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Container did not become healthy."
          docker logs mqtt-ci
          exit 1

      - name: Run MQTT smoke test
        run: go run scripts/mqtt_smoke_test.go -addr localhost:1883

      - name: Cleanup
        if: always()
        run: docker rm -f mqtt-ci
