name: CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Unit Tests Matrix
  # ─────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.26', 'stable']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Start Redis (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq redis-server
          redis-server --daemonize yes
          redis-cli ping

      - name: Run tests with race detector (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: go test -race -v -count=1 ./...

      - name: Run tests (Windows, no race — CGO not available)
        if: matrix.os == 'windows-latest'
        run: go test -v -count=1 ./...

      - name: Run tests with coverage (Linux only)
        if: matrix.os == 'ubuntu-latest'
        env:
          MQTT_REDIS_ADDR: localhost:6379
        run: go test -coverprofile=coverage.out -count=1 ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Check coverage threshold
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print int($3)}')
          echo "Coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 55 ]; then
            echo "Coverage ${COVERAGE}% is below 55% threshold"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 2: Plugin Manager Tests
  # ─────────────────────────────────────────────────────────────
  test-plugin:
    name: Plugin Manager Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run plugin tests
        run: go test -race -v ./plugin/...

  # ─────────────────────────────────────────────────────────────
  # Job 3: Scripted Test Runner
  # ─────────────────────────────────────────────────────────────
  test-scripts:
    name: Scripted Test Runner
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MQTT_REDIS_ADDR: localhost:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run scripted unit tests
        run: go run scripts/run_tests.go -mode unit -timeout=300s

      - name: Run scripted integration tests
        run: go run scripts/run_tests.go -mode integration -timeout=300s

  # ─────────────────────────────────────────────────────────────
  # Job 4: Code Quality
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          go fmt ./...
          if ! git diff --exit-code -- '*.go'; then
            echo "Files not formatted. Run 'go fmt ./...' locally."
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 5: Build Verification
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Verification
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.26', 'stable']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build all packages
        run: go build -v ./...

      - name: Build examples
        run: go build ./examples/...

      - name: Verify module
        run: go mod verify

      - name: Check go.mod and go.sum are tidy
        if: matrix.os != 'windows-latest'
        run: |
          if ! go mod tidy -diff; then
            echo "go.mod or go.sum is not tidy. Run 'go mod tidy' locally."
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 6: Docker Build & Smoke Test
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile -t shark-mqtt:ci .

      - name: Start container
        run: |
          docker run -d --name mqtt-ci -p 18983:18983 -p 18999:18999 shark-mqtt:ci -addr=:18983 -allow-all
          echo "Waiting for health check..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18999/healthz >/dev/null 2>&1; then
              echo "Container healthy."
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Container did not become healthy."
          docker logs mqtt-ci
          exit 1

      - name: Run MQTT smoke test
        run: go run scripts/mqtt_smoke.go -addr localhost:18983

      - name: Cleanup
        if: always()
        run: docker rm -f mqtt-ci
