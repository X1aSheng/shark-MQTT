version: "3.8"

services:
  mqtt:
    build: .
    image: shark-mqtt:latest
    container_name: shark-mqtt
    ports:
      - "1883:1883"
      - "9090:9090"
    environment:
      MQTT_LOG_LEVEL: info
    volumes:
      - mqtt-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

